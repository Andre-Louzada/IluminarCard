<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa Oficial - IluminarCard</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="script.js" defer> </script>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="liberar-acesso" id="liberar-acesso">
            <h1 style="color: white;">Bem-vindo ao Caixa Oficial do IluminarCard!</h1>
            <p style="color: white;">Por favor, insira a senha para liberar o acesso ao sistema.</p>
            <input type="password" id="senhaAcesso" placeholder="Digite a senha">
            <button class="btn-liberar" onclick="liberarAcesso()">Liberar Acesso</button>
    </div>

    <div id="image-container" class="image-container" style="display: none;">
        <img class="img-iluminarCard" src="iluminarCard.jpg" alt="erro na imagem"/>
        <div class="botoes">
            <button class="btn-escanear" onclick="escanear()">Escanear</button>
            <input type="text" id="idParticipante" placeholder="Digite o código do participante">
            <button class="btn-buscar" onclick="buscarManualmente()">Buscar</button>
        </div>    
        <p id="mensagemBuscaManual" style="font-weight: bold; margin-top: 15px;color: white;"></p>
    </div>
       
    <div id="reader"></div>

    <div id="verso-container" class="verso-container" style="display: none;">
        <img class="img-iluminarCard" src="cartaoVerso.jpg" alt="erro ao carregar imagem">
        <div class="informacoesUsuario">
            <div class="dados">
                <h2 id="nomeUsuario" style="margin-top: 10px; color: white;">Nome do Usuário</h2>
                <h3 id="saldoUsuario" style="margin-top: 0;color: white;">Saldo: R$ 0.00</h3>
            </div>

            <input  class="campo-valor" type="number" id="valorOperacao" placeholder="Digite o valor (Ex: 15.50)" step="0.05">
            
            <div class="botoes-verso">    
                <button class="btn-deposito" onclick="fazerOperacao('depositar')">Depositar</button>
                <button class="btn-cobrar" id="btn-cobrar" onclick="fazerOperacao('retirar')">Cobrar</button>
                <button class="btn-fechar" onclick="proximoCliente()" style="background-color: #2196F3; color: white;">Fechar</button>
            </div>
            <p id="mensagemSistema" class="mensagemSistema" style="font-weight: bold ;color: white;"></p>
        </div>
    </div>
</body>
</html>
